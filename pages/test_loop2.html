        //Contar los múltiplos de 17 entre los primeros 1000 numeros naturales
        
        let count = 0;

        for(let i=1;i<=1000;i++){
            if(i % 17 === 0){
                count = count + 1;
                // count++;
            }
        }
        console.log(`La cantidad de multiplos de 17 entre los primeros 1000 numeros es ${count}`);
