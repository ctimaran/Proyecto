<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bucles</title>
</head>
<body>
    

    <script>
        //Bucle for
        console.log("Números del 1 al 10");
        //Mostrar en consola números del 1 al 10
        for(let i= 1; i <= 10; i++){
            //Instrucciones que se repiten
            console.log(i);
        } 


        //Mostrar en consola números del 10 al 1
        console.log("Números del 10 al 1");
        for(let i= 10; i >= 1; i--){
            //Instrucciones que se repiten
            console.log(i);
        }

        //Bucle While

        let numero = 5;

        console.log("10 primeros múltiplos de 5");
        while(numero <= 50){
            console.log(numero);
            numero += 5;    
        }

        numero = 5;
        console.log("10 primeros múltiplos de 5 utilizando do.. while");
        do {
            console.log(numero);
            numero = numero + 5;
        }while(numero <= 50)


        //Instrucciones de control
        
        console.log("Instrucciones de control break y continue")

        for(let j=0; j<100;j++){

            if (j % 3 === 0){
                //Si es multiplo de 3 salta
                continue;  // Salta al siguiente iterador
            }

            console.log(j);

            if (j === 30){
                break;  //Detiene la ejecución
            }

        }

    </script>
</body>
</html>
